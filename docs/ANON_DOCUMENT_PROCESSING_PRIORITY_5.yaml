schema: ANON-DOCUMENT-PROCESSING-P5-v1
purpose: >
  Fortalecer tratamento especializado de PDF, DOCX e Excel preservando a
  regra central: o ANON substitui identificadores sensiveis sem reescrever o
  documento.

pdf_strategy:
  current_backend:
    primary_library: PyMuPDF
    extraction_order:
      - tentar tabelas com page.find_tables()
      - extrair blocos com sort=True para aproximar ordem visual
      - fallback para texto simples da pagina
    export_policy:
      - manter fac-simile quando PDF original permitir busca textual
      - preservar orientacao de pagina quando detectada
      - usar PDF reconstruido apenas quando fac-simile nao for viavel
  optional_future_tools:
    ocrmypdf:
      purpose: gerar PDF pesquisavel localmente antes da extracao quando houver imagem/scanner
      installer: "OCRmyPDF + Tesseract local"
      security: offline
    tesseract:
      purpose: OCR local
      installer: "Tesseract OCR para Windows"
      security: offline
    pdfplumber:
      purpose: inspecao detalhada de caracteres, linhas e tabelas
      status: opcional
    camelot:
      purpose: tabelas PDF com estrutura tabular clara
      status: opcional, depende do tipo de PDF

docx_strategy:
  current_backend:
    primary_library: python-docx
    extraction:
      - paragrafos
      - tabelas
    export:
      - modelo institucional quando disponivel
      - corpo alinhado a esquerda

excel_strategy:
  current_backend:
    primary_library: openpyxl
    supported_extensions:
      - .xlsx
      - .xlsm
    extraction:
      - abas
      - linhas
      - celulas com tabulacao
    note: >
      CSV continua prioritario para RIF. Excel entra como suporte adicional
      estruturado quando a dependencia local estiver instalada.

installers_recommended_for_operator_machine:
  required_core:
    - Python
    - Ollama
    - qwen3:32b
  recommended_pdf_ocr:
    - Tesseract OCR
    - OCRmyPDF
  recommended_office_conversion:
    - LibreOffice
  python_packages:
    - PyMuPDF
    - python-docx
    - openpyxl
    - reportlab
    - pypdf

security:
  - ferramentas devem rodar localmente
  - documentos sigilosos nao devem ser enviados para servicos externos
  - enriquecimento online e apenas para baixar dados publicos autorizados
