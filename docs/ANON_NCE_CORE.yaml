schema: ANON-NCE-CORE-v1
name: NCE-ANON
purpose: >
  Nucleo central de coordenacao do ANON. O NCE nao substitui diretamente texto
  e nao gera documentos. Ele classifica, coordena, preserva regras e mantem
  consistencia entre arquivos da mesma solicitacao.

responsibilities:
  - criar_contexto_de_grupo
  - identificar_subtipo_documental
  - coordenar_detectores_deterministicos
  - preparar_contexto_para_ia_local
  - manter_dicionario_compartilhado_de_substituicoes
  - gerar_chaves_canonicas_de_entidades
  - expor_metadados_seguros_de_auditoria

group_context:
  fields:
    - nce_group_id
    - request_title
    - document_kind
    - model
    - created_at
    - files
    - dictionary_size
    - counters
  rule: >
    Todo arquivo enviado na mesma solicitacao compartilha o mesmo contexto e o
    mesmo dicionario de substituicao.

canonical_dictionary:
  person_or_organization:
    normalization:
      - remover_acentos
      - remover_pontuacao
      - normalizar_espacos
      - casefold
    example:
      original_a: "Joao Carlos da Silva"
      original_b: "JOAO CARLOS DA SILVA"
      canonical_key: "PERSON:joao carlos da silva"
      marker: "[PESSOA_001]"
  numeric_identifiers:
    normalization:
      - manter_apenas_digitos
      - remover_zero_inicial_em_cpf_com_12_digitos
    example:
      original_a: "123.456.789-09"
      original_b: "012345678909"
      canonical_key: "CPF:12345678909"
      marker: "[CPF_001]"

rif_group_behavior:
  recognized_files:
    - "RIF[numeros]_Envolvidos.csv"
    - "RIF[numeros]_Ocorrencias.csv"
    - "RIF[numeros]_Comunicacoes.csv"
  consistency_goal: >
    Se a mesma pessoa, empresa ou identificador aparecer em mais de um arquivo
    do conjunto, todos recebem o mesmo marcador anonimo.
  preserve_relation_keys:
    - Indexador
    - idComunicacao
    - idOcorrencia
    - NumeroOcorrenciaBC

integration:
  parser: entrega_texto_e_metadados
  detectors: entregam_entidades_deterministicas
  ia_local: complementa_lacunas_semanticas_em_json
  validator: filtra_entidades_e_preserva_estrutura
  anonymizer: aplica_substituicoes_usando_dicionario_nce
  exporter: registra_hashes_e_metadados

non_goals:
  - reescrever_documento
  - interpretar_merito_investigativo
  - resumir_conteudo
  - gerar_csv_pdf_docx_pela_ia
  - expor_dicionario_reversivel_em_produto_externo
