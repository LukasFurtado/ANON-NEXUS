schema: ANON-RIF-CSV-NCE-v1
purpose: >
  Base tecnica do NCE para reconhecer e anonimizar CSVs padrao RIF/COAF
  preservando estrutura, relacoes e semantica operacional.

recognition:
  by_filename:
    envolvidos: "RIF[numeros]_Envolvidos.csv"
    ocorrencias: "RIF[numeros]_Ocorrencias.csv"
    comunicacoes: "RIF[numeros]_Comunicacoes.csv"
  by_header:
    envolvidos:
      required:
        - Indexador
        - cpfCnpjEnvolvido
        - nomeEnvolvido
        - tipoEnvolvido
        - agenciaEnvolvido
        - contaEnvolvido
    ocorrencias:
      required:
        - Indexador
        - idOcorrencia
        - Ocorrencia
    comunicacoes:
      required:
        - Indexador
        - idComunicacao
        - NumeroOcorrenciaBC
        - Data_do_Recebimento
        - Data_da_operacao
        - cpfCnpjComunicante
        - nomeComunicante
        - informacoesAdicionais
        - CodigoSegmento

subtypes:
  rif_envolvidos:
    structural_role: tabela_de_entidades_vinculadas_ao_rif
    anonymize_columns:
      - cpfCnpjEnvolvido
      - nomeEnvolvido
      - agenciaEnvolvido
      - contaEnvolvido
    preserve_columns:
      - Indexador
      - tipoEnvolvido
      - DataAberturaConta
      - DataAtualizacaoConta
      - bitPepCitado
      - bitPessoaObrigadaCitado
      - intServidorCitado
    notes:
      - O papel do envolvido deve ser preservado.
      - CPF/CNPJ e nome do envolvido sao entidades sensiveis.
      - Agencia e conta do envolvido sao sensiveis quando vinculadas ao titular.

  rif_ocorrencias:
    structural_role: tabela_de_tipologias_e_classificacoes_operacionais
    anonymize_columns: []
    preserve_columns:
      - Indexador
      - idOcorrencia
      - Ocorrencia
    notes:
      - Ocorrencia normalmente descreve classificacao tecnica, normativa ou operacional.
      - So deve haver anonimizacao se aparecer dado pessoal acidental dentro do texto.

  rif_comunicacoes:
    structural_role: tabela_de_comunicacoes_coaf_e_narrativa_operacional
    preserve_columns:
      - Indexador
      - idComunicacao
      - NumeroOcorrenciaBC
      - Data_do_Recebimento
      - Data_da_operacao
      - DataFimFato
      - cpfCnpjComunicante
      - nomeComunicante
      - CidadeAgencia
      - UFAgencia
      - NomeAgencia
      - NumeroAgencia
      - CampoA
      - CampoB
      - CampoC
      - CampoD
      - CampoE
      - CodigoSegmento
    narrative_columns:
      - informacoesAdicionais
    anonymize_inside_narrative:
      - pessoa_fisica
      - empresa_privada_sensivel
      - cpf_cnpj_contraparte
      - conta
      - agencia
      - pix
      - endereco
      - telefone
      - email
    notes:
      - Comunicante financeiro e dado operacional do RIF e deve ser preservado.
      - Valores, datas e codigos devem permanecer integrais.
      - A narrativa pode conter contrapartes e identificadores privados.

cross_file_consistency:
  - Indexador deve ser preservado para manter relacao entre arquivos.
  - A mesma entidade em arquivos do mesmo grupo deve receber o mesmo marcador anonimo.
  - O backend aplica substituicoes; a IA local apenas sugere entidades.
  - O CSV deve sair com mesmo delimitador, cabecalho, ordem de colunas, ordem de linhas e campos vazios.

json_contract:
  root: entities
  required_fields:
    - type
    - text
  recommended_fields:
    - start
    - end
  forbidden:
    - markdown
    - resumo
    - texto anonimizado pela IA
    - csv gerado pela IA
    - reescrita documental

source_mapping:
  yaml_sections_used:
    - document_fingerprint
    - layout_model
    - field_catalog
    - parser_specification
    - anonymization_specification
    - validation_specification
    - confidence_and_gaps
