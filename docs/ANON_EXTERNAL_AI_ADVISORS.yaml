schema: ANON-EXTERNAL-AI-ADVISORS-v1
nome: Consultoria Externa Segura
estado_padrao: desabilitado
principio_central: >
  APIs externas podem auxiliar a evolucao tecnica do ANON, mas nao participam
  da anonimização documental e nao recebem documentos, trechos reais, nomes,
  identificadores, logs crus ou informacoes de casos concretos.

provedores_suportados:
  - OpenAI
  - Anthropic
  - Google
  - Azure
  - AWS

finalidades_permitidas:
  prompt_review:
    descricao: Revisar prompts e regras do ANON.
    dados: somente texto sanitizado, publico ou ficticio.
  json_contract_improvement:
    descricao: Sugerir melhorias de contrato JSON.
    dados: exemplos ficticios e esquemas tecnicos sem dados reais.
  technical_documentation:
    descricao: Gerar documentacao tecnica.
    dados: arquitetura, regras e descricoes sem documento sensivel.
  generic_error_explanation:
    descricao: Explicar erros genericos.
    dados: mensagens sem nomes, arquivos, identificadores ou conteudo documental.
  sanitized_log_classification:
    descricao: Classificar logs ja sanitizados.
    dados: logs sem identificadores, nomes de arquivo real ou conteudo extraido.
  synthetic_validation_patterns:
    descricao: Sugerir padroes de validacao.
    dados: dados ficticios controlados.
  synthetic_tests:
    descricao: Criar testes sinteticos.
    dados: fixtures ficticias sem correspondencia com caso real.

bloqueios_obrigatorios:
  - documentos reais
  - trechos extraidos de documentos
  - nomes de pessoas ou empresas
  - CPF, CNPJ, RG, CNH, passaporte, CEP, endereco, telefone, email, PIX e dados bancarios
  - logs sem sanitizacao
  - nomes de arquivos vinculados a caso real
  - qualquer dado que identifique investigacao, vitima, testemunha, investigado ou operador

endpoints:
  status:
    metodo: GET
    rota: /security/external-advisor/status
    funcao: Informar provedores, finalidades permitidas e bloqueios.
  prepare:
    metodo: POST
    rota: /security/external-advisor/prepare
    funcao: Validar uma solicitacao segura antes de qualquer uso externo.

configuracao:
  variavel_principal: NEXUS_ANON_EXTERNAL_ADVISOR_ENABLED
  valor_padrao: false
  observacao: >
    Mesmo quando habilitado, a camada deve continuar impedindo documentos e
    dados identificadores. O processamento dos arquivos permanece local.

contrato_minimo:
  provider: openai | anthropic | google | azure | aws
  purpose: prompt_review | json_contract_improvement | technical_documentation | generic_error_explanation | sanitized_log_classification | synthetic_validation_patterns | synthetic_tests
  data_classification: sanitized | synthetic | public
  prompt: texto seguro sem dados reais
  metadata: metadados simples e nao sensiveis
