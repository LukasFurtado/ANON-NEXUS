schema: ANON-HYBRID-SECURITY-v1
purpose: >
  Absorver a proposta de arquitetura hibrida de forma compativel com a
  filosofia do ANON: processamento sensivel sempre local e offline, com
  enriquecimento de bibliotecas apenas como fluxo publico, controlado e
  desabilitado por padrao.

default_mode:
  mode: OFFLINE
  document_processing: allowed
  internet: disabled
  uploads: blocked
  local_ai: required

enrichment_mode:
  status: optional
  default_enabled: false
  purpose: baixar somente dados publicos para bibliotecas locais
  allowed_direction: download_public_data_only
  forbidden:
    - processar documentos
    - enviar arquivos do usuario
    - enviar CPF, nomes, enderecos ou dados investigativos
    - manter conexao aberta permanentemente
  allowed_public_sources:
    - IBGE
    - BrasilAPI Bancos

implemented_controls:
  - app.core.hybrid_security.HybridSecurityManager
  - endpoint GET /security/mode
  - endpoint POST /security/enrichment/plan
  - endpoint POST /security/enrichment/download
  - bloqueio no inicio do pipeline de anonimizacao
  - whitelist de fontes publicas por HTTPS
  - detector simples de padroes sensiveis em conteudo baixado
  - manifesto SHA-256 para dados publicos futuros
  - log local data/hybrid_security_audit.jsonl
  - download real de fontes publicas autorizadas quando NEXUS_ANON_HYBRID_ENRICHMENT_ENABLED=true
  - politica backend/resources/knowledge/external_api_policy.json bloqueando consultas externas com CPF, CNPJ, CEP ou documentos

compatibility_decision:
  accepted:
    - dois modos operacionais
    - offline como padrao
    - bloqueio de processamento fora do offline
    - whitelist de fontes publicas
    - integridade por SHA-256
    - auditoria local
  implemented_with_guard:
    - downloads reais automaticos somente quando habilitados por configuracao
    - retorno automatico ao modo OFFLINE apos tentativa de download
  deferred_for_safety:
    - agendamento online
    - atualizacao silenciosa
    - qualquer conexao sem confirmacao explicita

security_statement: >
  Nesta implementacao, a arquitetura hibrida nao altera a regra central:
  documentos sigilosos nao saem do computador e nao sao processados em modo
  de enriquecimento. O modo online permanece desabilitado por configuracao.

external_api_policy:
  allowed:
    - baixar listas publicas em lote
    - salvar localmente com SHA-256
    - usar depois em modo offline
  blocked:
    - consultar CPF em API externa
    - consultar CEP extraido de documento
    - consultar CNPJ extraido de documento durante processamento
    - enviar texto para IA de nuvem
